<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>G.A.L. - Gerenciador de Agentes</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">

        <h1>G.A.L.</h1>

        <p>Gerenciador de Agentes</p>

    </div>

</header>

<nav class="menu">

    <button class="tab-button active" data-tab="inicio">
        🏠 Inicial
    </button>

    <button class="tab-button" data-tab="status">
        📊 Status
    </button>

    <button class="tab-button" data-tab="pericias">
        🎯 Perícias
    </button>

    <button class="tab-button" data-tab="inventario">
        🎒 Inventário
    </button>

    <button class="tab-button" data-tab="habilidades">
        ✨ Habilidades
    </button>

    <button class="tab-button" data-tab="rituais">
        📖 Rituais
    </button>

</nav>

<main>

<!-- ===================================== -->
<!-- ABA INICIAL -->
<!-- ===================================== -->

<section id="inicio" class="tab active">

    <h2>Informações do Personagem</h2>

    <div class="campo">

        <label>Nome do Personagem</label>

        <input
        type="text"
        id="nome">

    </div>

    <div class="campo">

        <label>Jogador</label>

        <input
        type="text"
        id="jogador">

    </div>

    <div class="campo">

        <label>Origem</label>

        <input
        type="text"
        id="origem">

    </div>

    <div class="campo">

        <label>Classe</label>

        <input
        type="text"
        id="classe">

    </div>

</section>

<!-- ===================================== -->
<!-- STATUS -->
<!-- ===================================== -->

<section id="status" class="tab">

    <h2>Status</h2>

    <h3>Atributos</h3>

    <p id="pontosRestantes">

        Pontos Restantes:
        <strong>4</strong>

    </p>

    <div class="atributo">

        <span>FOR</span>

        <button class="menos">-</button>

        <input
        id="for"
        type="number"
        value="1"
        readonly>

        <button class="mais">+</button>

    </div>

    <div class="atributo">

        <span>AGI</span>

        <button class="menos">-</button>

        <input
        id="agi"
        type="number"
        value="1"
        readonly>

        <button class="mais">+</button>

    </div>

    <div class="atributo">

        <span>INT</span>

        <button class="menos">-</button>

        <input
        id="int"
        type="number"
        value="1"
        readonly>

        <button class="mais">+</button>

    </div>

    <div class="atributo">

        <span>PRE</span>

        <button class="menos">-</button>

        <input
        id="pre"
        type="number"
        value="1"
        readonly>

        <button class="mais">+</button>

    </div>

    <div class="atributo">

        <span>VIG</span>

        <button class="menos">-</button>

        <input
        id="vig"
        type="number"
        value="1"
        readonly>

        <button class="mais">+</button>

    </div>

    <hr>

    <div class="campo">

        <label>NEX</label>

        <input
        id="nex"
        type="number">

    </div>

    <div class="campo">

        <label>Vida</label>

        <input
        id="vida"
        type="text">

    </div>

    <div class="campo">

        <label>Sanidade</label>

        <input
        id="sanidade"
        type="text">

    </div>

    <div class="campo">

        <button id="trocarRecurso">

            Usar PE

        </button>

    </div>

    <div class="campo">

        <label id="labelRecurso">

            Pontos de Esforço (PE)

        </label>

        <input
        id="recurso"
        type="text">

    </div>

    <div class="campo">

        <label>Defesa</label>

        <input
        id="defesa"
        type="number">

    </div>

    <div class="campo">

        <label>Esquiva</label>

        <input
        id="esquiva"
        type="number">

    </div>

    <div class="campo">

        <label>Bloqueio</label>

        <input
        id="bloqueio"
        type="number">

    </div>

    <div class="campo">

        <label>Resistências</label>

        <textarea
        id="resistencias"></textarea>

    </div>

  </section>
  <!-- ===================================== -->
<!-- PERÍCIAS -->
<!-- ===================================== -->

<section id="pericias" class="tab">

    <h2>Perícias</h2>

    <div class="topo-lista">

        <input
            type="text"
            id="pesquisaPericia"
            placeholder="Pesquisar perícia...">

        <button id="novaPericia">
            + Nova Perícia
        </button>

    </div>

    <div id="listaPericias"></div>

</section>

<!-- ===================================== -->
<!-- INVENTÁRIO -->
<!-- ===================================== -->

<section id="inventario" class="tab">

    <h2>Inventário</h2>

    <div class="topo-lista">

        <span id="pesoAtual">
            Peso: 0 / 5
        </span>

        <button id="novoItem">
            + Novo Item
        </button>

    </div>

    <div id="listaItens"></div>

</section>

<!-- ===================================== -->
<!-- HABILIDADES -->
<!-- ===================================== -->

<section id="habilidades" class="tab">

    <h2>Habilidades</h2>

    <div class="topo-lista">

        <input
            type="text"
            id="pesquisaHabilidade"
            placeholder="Pesquisar habilidade...">

        <button id="novaHabilidade">
            + Nova Habilidade
        </button>

    </div>

    <div id="listaHabilidades"></div>

</section>

<!-- ===================================== -->
<!-- RITUAIS -->
<!-- ===================================== -->

<section id="rituais" class="tab">

    <h2>Rituais</h2>

    <div class="topo-lista">

        <input
            type="text"
            id="pesquisaRitual"
            placeholder="Pesquisar ritual...">

        <button id="novoRitual">
            + Novo Ritual
        </button>

    </div>

    <div id="listaRituais"></div>

</section>

<!-- ===================================== -->
<!-- MODAL PERÍCIA -->
<!-- ===================================== -->

<div id="modalPericia" class="modal">

    <div class="modal-content">

        <h2>Nova Perícia</h2>

        <label>Nome</label>
        <input type="text" id="periciaNome">

        <label>Atributo</label>
        <select id="periciaAtributo">
            <option>FOR</option>
            <option>AGI</option>
            <option>INT</option>
            <option>PRE</option>
            <option>VIG</option>
        </select>

        <label>Bônus</label>
        <input type="number" id="periciaBonus">

        <div class="modal-botoes">
            <button id="salvarPericia">Salvar</button>
            <button id="cancelarPericia">Cancelar</button>
        </div>

    </div>

</div>

<!-- ===================================== -->
<!-- MODAL ITEM -->
<!-- ===================================== -->

<div id="modalItem" class="modal">

    <div class="modal-content">

        <h2>Novo Item</h2>

        <label>Nome</label>
        <input type="text" id="itemNome">

        <label>Peso</label>
        <input type="number" id="itemPeso">

        <label>Descrição / Habilidade</label>
        <textarea id="itemDescricao"></textarea>

        <div class="modal-botoes">
            <button id="salvarItem">Salvar</button>
            <button id="cancelarItem">Cancelar</button>
        </div>

    </div>

</div>

<!-- ===================================== -->
<!-- MODAL HABILIDADE -->
<!-- ===================================== -->

<div id="modalHabilidade" class="modal">

    <div class="modal-content">

        <h2>Nova Habilidade</h2>

        <label>Nome</label>
        <input type="text" id="habNome">

        <label>Tag</label>
        <input
            type="text"
            id="habTag"
            placeholder="Classe, Origem, Poder Paranormal...">

        <div id="campoElemento" style="display:none;">

            <label>Elemento</label>

            <select id="habElemento">
                <option>Conhecimento</option>
                <option>Energia</option>
                <option>Morte</option>
                <option>Sangue</option>
                <option>Medo</option>
            </select>

        </div>

        <label>Descrição</label>
        <textarea id="habDescricao"></textarea>

        <div class="modal-botoes">
            <button id="salvarHabilidade">Salvar</button>
            <button id="cancelarHabilidade">Cancelar</button>
        </div>

    </div>

</div>

<!-- ===================================== -->
<!-- MODAL RITUAL -->
<!-- ===================================== -->

<div id="modalRitual" class="modal">

    <div class="modal-content">

        <h2>Novo Ritual</h2>

        <label>Nome</label>
        <input type="text" id="ritualNome">

        <label>Elemento</label>
        <select id="ritualElemento">
            <option>Conhecimento</option>
            <option>Energia</option>
            <option>Morte</option>
            <option>Sangue</option>
            <option>Medo</option>
        </select>

        <label>Círculo</label>
        <input type="number" id="ritualCirculo" min="1" max="4">

        <label>Execução</label>
        <input type="text" id="ritualExecucao">

        <label>Alcance</label>
        <input type="text" id="ritualAlcance">

        <label>Alvo</label>
        <input type="text" id="ritualAlvo">

        <label>Duração</label>
        <input type="text" id="ritualDuracao">

        <label>Resistência</label>
        <input type="text" id="ritualResistencia">

        <label>Descrição</label>
        <textarea id="ritualDescricao"></textarea>

        <div class="modal-botoes">
            <button id="salvarRitual">Salvar</button>
            <button id="cancelarRitual">Cancelar</button>
        </div>

    </div>

      </div>
      <!-- ===================================== -->
<!-- FECHAMENTO -->
<!-- ===================================== -->

</main>

<!-- ===================================== -->
<!-- SCRIPT -->
<!-- ===================================== -->

<script src="script.js"></script>

</body>

</html>
