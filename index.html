<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha - Ordem Paranormal</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <h1>ORDEM PARANORMAL</h1>
    <h2>Ficha de Personagem</h2>

</header>

<nav class="menu">

    <button class="tab-button active" data-tab="inicio">
        Inicial
    </button>

    <button class="tab-button" data-tab="status">
        Status
    </button>

    <button class="tab-button" data-tab="pericias">
        Perícias
    </button>

    <button class="tab-button" data-tab="inventario">
        Inventário
    </button>

    <button class="tab-button" data-tab="rituais">
        Rituais
    </button>

</nav>

<main>

<!-- ========================= -->
<!-- ABA INICIAL -->
<!-- ========================= -->

<section id="inicio" class="tab active">

<h2>Informações</h2>

<label>Nome do Personagem</label>
<input type="text" id="nome">

<label>Jogador</label>
<input type="text" id="jogador">

<label>Origem</label>
<input type="text" id="origem">

<label>Classe</label>
<input type="text" id="classe">

</section>

<!-- ========================= -->
<!-- STATUS -->
<!-- ========================= -->

<section id="status" class="tab">

<h2>Status</h2>

<h3>Atributos</h3>

<div class="atributo">

<span>FOR</span>

<button>-</button>

<input type="number" value="1">

<button>+</button>

</div>

<div class="atributo">

<span>AGI</span>

<button>-</button>

<input type="number" value="1">

<button>+</button>

</div>

<div class="atributo">

<span>INT</span>

<button>-</button>

<input type="number" value="1">

<button>+</button>

</div>

<div class="atributo">

<span>PRE</span>

<button>-</button>

<input type="number" value="1">

<button>+</button>

</div>

<div class="atributo">

<span>VIG</span>

<button>-</button>

<input type="number" value="1">

<button>+</button>

</div>

<h3>NEX</h3>

<input type="number" id="nex">

<hr>

<label>Vida</label>
<input type="text">

<label>Sanidade</label>
<input type="text">

<label>Pontos de Esforço (PE)</label>
<input type="text">

<label>Defesa</label>
<input type="text">

<label>Esquiva</label>
<input type="text">

<label>Bloqueio</label>
<input type="text">

<label>Resistências</label>
<textarea></textarea>

</section>

<!-- ========================= -->
<!-- PERÍCIAS -->
<!-- ========================= -->

<section id="pericias" class="tab">

<h2>Perícias</h2>

<button id="novaPericia">

+ Nova Perícia

</button>

<div id="listaPericias">

</div>

</section>

<!-- ========================= -->
<!-- INVENTÁRIO -->
<!-- ========================= -->

<section id="inventario" class="tab">

<h2>Inventário</h2>

<h3>

Peso:

<span id="pesoAtual">

0 / 5

</span>

</h3>

<button id="novoItem">

+ Novo Item

</button>

<div id="listaItens">

</div>

</section>

<!-- ========================= -->
<!-- RITUAIS -->
<!-- ========================= -->

<section id="rituais" class="tab">

<h2>Rituais</h2>

<button id="novoRitual">

+ Novo Ritual

</button>

<div id="listaRituais">

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
